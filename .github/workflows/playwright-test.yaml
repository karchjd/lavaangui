# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, dev, bug-fixes, repro-plot-new]

name: playwright-test

jobs:
  playwright-test:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Compile
        run: npm run build:deploy --prefix frontend
      - name: Compile & Start
        run: Rscript -e 'source("dev/start_for_tests.R")' &

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: frontend
      - name: Wait for Shiny server
        run: |
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3245/ | grep -q '200'; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... attempt $i"
            sleep 2
          done
          echo "Server failed to start within 120 seconds"
          exit 1
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
